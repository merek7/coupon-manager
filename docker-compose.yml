services:
  app:
    build: .
    ports:
      - "5076:5076"
    volumes:
      - coupon_data:/data
    environment:
      - DATABASE_PATH=/data/coupons.db
      - PORT=5076
      - SECRET_KEY=change-this-secret-key-in-production
      - ADMIN_PASSWORD=changeme
    restart: unless-stopped

volumes:
  coupon_data:
